<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTM Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 15px;
  background: #f4f6f8;
}

h2 { margin-bottom: 10px; }

.dashboard {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 10px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  box-sizing: border-box;
}

button {
  border: none;
  cursor: pointer;
  border-radius: 4px;
}

.green { background: #28a745; color: white; }
.red { background: #dc3545; color: white; }
.orange { background: #fd7e14; color: white; }

.search {
  margin-top: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: white;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  font-size: 14px;
}

th {
  background: #333;
  color: white;
}

.pending { background: #fff3cd; }
.signed { background: #d4edda; }
.not-signed { background: #f8d7da; }

canvas {
  background: white;
  border-radius: 8px;
  margin-top: 10px;
  padding: 10px;
}

/* modal */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  margin: 10% auto;
  padding: 20px;
  width: 90%;
  max-width: 500px;
  border-radius: 8px;
}
</style>
</head>

<body>

<h2>TTM Tracker</h2>

<!-- DASHBOARD -->
<div class="dashboard">
  <div class="card"><h3 id="total">0</h3><small>Total</small></div>
  <div class="card"><h3 id="pending">0</h3><small>Pending</small></div>
  <div class="card"><h3 id="signed">0</h3><small>Signed</small></div>
  <div class="card"><h3 id="notSigned">0</h3><small>Not Signed</small></div>
</div>

<!-- INPUT -->
<input id="name" placeholder="Name">
<input id="address" placeholder="Address">
<input id="dateSent" type="date">

<select id="rts">
  <option value="false">RTS: No</option>
  <option value="true">RTS: Yes</option>
</select>

<select id="received_auto">
  <option value="false">Auto: No</option>
  <option value="true">Auto: Yes</option>
</select>

<button class="green" onclick="addEntry()">Save Entry</button>

<!-- SEARCH -->
<input class="search" id="search" placeholder="Search..." oninput="render()">

<!-- PIE ONLY -->
<canvas id="statusChart" height="140"></canvas>

<!-- TABLE -->
<table>
<thead>
<tr>
  <th>Name</th>
  <th>Address</th>
  <th>Sent</th>
  <th>Received</th>
  <th>RTS</th>
  <th>Legitimacy</th>
  <th>Status</th>
  <th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<!-- PROFILE -->
<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 id="pName"></h3>
    <div id="pHistory"></div>
    <button class="red" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const sb = window.supabase.createClient(
  "https://aeezsewfoozizduzuidv.supabase.co",
  "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz"
);

let data = [];
let chart;

/* LEGITIMACY ENGINE */
function getLegitimacy(d) {
  if (!d.date_sent || !d.date_received) return "Unknown";

  const days =
    (new Date(d.date_received) - new Date(d.date_sent)) /
    (1000 * 60 * 60 * 24);

  const auto = d.received_auto === "true" || d.received_auto === true;
  const rts = d.rts === "true" || d.rts === true;

  if (d.returned && (days <= 15 || auto)) {
    return "Probable Secretarial/Autopen";
  }

  if (d.returned && !rts && days > 15 && days <= 120) {
    return "Real";
  }

  return "Unknown";
}

/* LOAD */
async function loadData() {
  const { data: rows } = await sb.from("Tracking").select("*").order("created_at", { ascending: false });
  data = rows || [];
  render();
  stats();
  pie();
}

/* ADD */
async function addEntry() {
  const name = document.getElementById("name").value;
  const address = document.getElementById("address").value;
  const date_sent = document.getElementById("dateSent").value;
  const rts = document.getElementById("rts").value;
  const received_auto = document.getElementById("received_auto").value;

  if (!name || !address) return alert("Missing fields");

  await sb.from("Tracking").insert([{
    name,
    address,
    date_sent,
    returned: false,
    rts,
    received_auto,
    date_received: null
  }]);

  document.getElementById("name").value = "";
  document.getElementById("address").value = "";
  document.getElementById("dateSent").value = "";

  loadData();
}

/* UPDATE FIELD */
async function updateField(id, field, value) {
  await sb.from("Tracking").update({ [field]: value }).eq("id", id);
}

/* STATUS */
async function setStatus(id, status) {
  await sb.from("Tracking").update({
    returned: true,
    signature_status: status
  }).eq("id", id);

  loadData();
}

/* DELETE */
async function remove(id) {
  if (!confirm("Delete?")) return;
  await sb.from("Tracking").delete().eq("id", id);
  loadData();
}

/* STATS */
function stats() {
  document.getElementById("total").innerText = data.length;
  document.getElementById("pending").innerText = data.filter(d => !d.returned).length;
  document.getElementById("signed").innerText = data.filter(d => d.signature_status === "signed").length;
  document.getElementById("notSigned").innerText = data.filter(d => d.signature_status === "not_signed").length;
}

/* PIE */
function pie() {
  const s = data.filter(d => d.signature_status === "signed").length;
  const n = data.filter(d => d.signature_status === "not_signed").length;
  const p = data.filter(d => !d.returned).length;

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("statusChart"), {
    type: "pie",
    data: {
      labels: ["Pending", "Signed", "Not Signed"],
      datasets: [{
        data: [p, s, n],
        backgroundColor: ["#ffc107", "#28a745", "#dc3545"]
      }]
    }
  });
}

/* RENDER */
function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const t = document.getElementById("table");
  t.innerHTML = "";

  data
    .filter(d =>
      (d.name||"").toLowerCase().includes(q) ||
      (d.address||"").toLowerCase().includes(q)
    )
    .forEach(d => {

      const status =
        d.signature_status === "signed" ? "Signed" :
        d.signature_status === "not_signed" ? "Not Signed" :
        "Pending";

      const cls =
        status === "Signed" ? "signed" :
        status === "Not Signed" ? "not-signed" :
        "pending";

      t.innerHTML += `
        <tr class="${cls}">
          <td onclick="openProfile('${d.name}')">${d.name||""}</td>
          <td>${d.address||""}</td>

          <td>${d.date_sent||""}</td>

          <td>
            <input type="date"
              value="${d.date_received||""}"
              onchange="updateField('${d.id}','date_received',this.value)">
          </td>

          <td>
            <select onchange="updateField('${d.id}','rts',this.value)">
              <option value="false" ${!d.rts ? "selected":""}>No</option>
              <option value="true" ${d.rts ? "selected":""}>Yes</option>
            </select>
          </td>

          <td>${getLegitimacy(d)}</td>

          <td>${status}</td>

          <td>
            <button class="green" onclick="setStatus('${d.id}','signed')">Signed</button>
            <button class="orange" onclick="setStatus('${d.id}','not_signed')">Not Signed</button>
            <button class="red" onclick="remove('${d.id}')">Del</button>
          </td>
        </tr>
      `;
    });
}

/* PROFILE */
function openProfile(name) {
  const p = data.filter(d => d.name === name);
  document.getElementById("pName").innerText = name;
  document.getElementById("pHistory").innerHTML =
    p.map(x => `<div>${x.date_sent} → ${x.signature_status||"pending"}</div>`).join("");
  document.getElementById("modal").style.display = "block";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

loadData();
</script>

</body>
</html>
