<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTM Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 15px;
  background: #f4f6f8;
}

h2 { margin-bottom: 10px; }

.dashboard {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 10px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  box-sizing: border-box;
}

button {
  border: none;
  cursor: pointer;
  border-radius: 4px;
}

.green { background: #28a745; color: white; }
.red { background: #dc3545; color: white; }

.search {
  margin-top: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: white;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  font-size: 14px;
}

th {
  background: #333;
  color: white;
}

.pending { background: #fff3cd; }
.signed { background: #d4edda; }
.not-signed { background: #f8d7da; }

/* FIXED PIE SIZE */
canvas {
  background: white;
  border-radius: 8px;
  margin-top: 10px;
  padding: 10px;
  max-height: 220px;
  max-width: 420px;
}
</style>
</head>

<body>

<h2>TTM Tracker</h2>

<!-- DASHBOARD -->
<div class="dashboard">
  <div class="card"><h3 id="total">0</h3><small>Total</small></div>
  <div class="card"><h3 id="pending">0</h3><small>Pending</small></div>
  <div class="card"><h3 id="signed">0</h3><small>Signed</small></div>
  <div class="card"><h3 id="notSigned">0</h3><small>Not Signed</small></div>
</div>

<!-- ENTRY -->
<input id="name" placeholder="Name">
<input id="address" placeholder="Address">
<input id="dateSent" type="date">

<button class="green" onclick="addEntry()">Save Entry</button>

<!-- SEARCH -->
<input class="search" id="search" placeholder="Search..." oninput="render()">

<!-- PIE -->
<canvas id="statusChart" height="140"></canvas>

<!-- TABLE -->
<table>
<thead>
<tr>
  <th>Name</th>
  <th>Address</th>
  <th>Sent</th>
  <th>Received</th>
  <th>Status</th>
  <th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
const sb = window.supabase.createClient(
  "https://aeezsewfoozizduzuidv.supabase.co",
  "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz"
);

let data = [];
let chart;

/* LOAD */
async function loadData() {
  const { data: rows } = await sb
    .from("Tracking")
    .select("*")
    .order("created_at", { ascending: false });

  data = rows || [];
  render();
  stats();
  pie();
}

/* ADD */
async function addEntry() {
  const name = document.getElementById("name").value;
  const address = document.getElementById("address").value;
  const date_sent = document.getElementById("dateSent").value;

  if (!name || !address) return alert("Missing fields");

  const { error } = await sb.from("Tracking").insert([{
    name,
    address,
    date_sent,
    returned: false,
    date_received: null,
    signature_status: "pending"
  }]);

  if (error) return alert(error.message);

  document.getElementById("name").value = "";
  document.getElementById("address").value = "";
  document.getElementById("dateSent").value = "";

  loadData();
}

/* STATUS */
async function setStatus(id, status) {
  await sb.from("Tracking")
    .update({ signature_status: status, returned: true })
    .eq("id", id);

  loadData();
}

/* DELETE */
async function remove(id) {
  if (!confirm("Delete?")) return;
  await sb.from("Tracking").delete().eq("id", id);
  loadData();
}

/* STATS */
function stats() {
  document.getElementById("total").innerText = data.length;
  document.getElementById("pending").innerText = data.filter(d => !d.returned).length;
  document.getElementById("signed").innerText = data.filter(d => d.signature_status === "signed").length;
  document.getElementById("notSigned").innerText = data.filter(d => d.signature_status === "not_signed").length;
}

/* PIE (SMALL + CLEAN) */
function pie() {
  const signed = data.filter(d => d.signature_status === "signed").length;
  const notSigned = data.filter(d => d.signature_status === "not_signed").length;
  const pending = data.filter(d => !d.returned).length;

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("statusChart"), {
    type: "pie",
    data: {
      labels: ["Pending", "Signed", "Not Signed"],
      datasets: [{
        data: [pending, signed, notSigned],
        backgroundColor: ["#ffc107", "#28a745", "#dc3545"]
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false
    }
  });
}

/* TABLE */
function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const t = document.getElementById("table");
  t.innerHTML = "";

  data
    .filter(d =>
      (d.name||"").toLowerCase().includes(q) ||
      (d.address||"").toLowerCase().includes(q)
    )
    .forEach(d => {

      const status =
        d.signature_status === "signed" ? "Signed" :
        d.signature_status === "not_signed" ? "Not Signed" :
        "Pending";

      const cls =
        status === "Signed" ? "signed" :
        status === "Not Signed" ? "not-signed" :
        "pending";

      t.innerHTML += `
        <tr class="${cls}">
          <td>${d.name||""}</td>
          <td>${d.address||""}</td>
          <td>${d.date_sent||""}</td>

          <td>
            <input type="date"
              value="${d.date_received||""}"
              onchange="sb.from('Tracking').update({date_received:this.value}).eq('id','${d.id}')">
          </td>

          <td>${status}</td>

          <td>
            <button class="green" onclick="setStatus('${d.id}','signed')">Signed</button>
            <button class="red" onclick="setStatus('${d.id}','not_signed')">Not Signed</button>
            <button class="red" onclick="remove('${d.id}')">Del</button>
          </td>
        </tr>
      `;
    });
}

loadData();
</script>

</body>
</html>
