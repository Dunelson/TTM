<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTM Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 15px;
  background: #f4f6f8;
}

h2 { margin-bottom: 10px; }

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
}

button {
  border: none;
  border-radius: 4px;
  cursor: pointer;
  color: white;
}

.green { background: #1f7a3a; }
.yellow { background: #8a6d1a; }
.red { background: #7a1f1f; }
.gray { background: #444; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: white;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  font-size: 14px;
}

th {
  background: #222;
  color: white;
}

/* status coloring */
.pendingCell { background: #8a6d1a; color: white; }
.signedCell { background: #1f7a3a; color: white; }
.rtsCell { background: #7a1f1f; color: white; }

/* chart */
.chart-wrap {
  max-width: 320px;
  margin: 10px auto;
}
</style>
</head>

<body>

<h2>TTM Tracker</h2>

<div class="chart-wrap">
  <canvas id="pieChart"></canvas>
</div>

<input id="name" placeholder="Name">
<input id="address" placeholder="Address">
<input id="dateSent" type="date">

<button class="green" onclick="addEntry()">Save Entry</button>

<hr>

<table>
<thead>
<tr>
  <th>Name</th>
  <th>Address</th>
  <th>Sent</th>
  <th>Received</th>
  <th>Status</th>
  <th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

/* =========================
   SUPABASE
========================= */
const sb = window.supabase.createClient(
  "https://aeezsewfoozizduzuidv.supabase.co",
  "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz"
);

/* =========================
   STATE
========================= */
let data = [];
let chart;

/* =========================
   LOAD
========================= */
async function loadData() {
  const { data: rows } = await sb.from("Tracking")
    .select("*")
    .order("created_at", { ascending: false });

  data = rows || [];
  render();
  updateChart();
}

loadData();

/* =========================
   ADD ENTRY
========================= */
async function addEntry() {
  const name = document.getElementById("name").value.trim();
  const address = document.getElementById("address").value.trim();
  const date_sent = document.getElementById("dateSent").value;

  if (!name || !address) return alert("Missing fields");

  await sb.from("Tracking").insert([{
    name,
    address,
    date_sent,
    date_received: null,
    returned: false,
    rts: false
  }]);

  document.getElementById("name").value = "";
  document.getElementById("address").value = "";
  document.getElementById("dateSent").value = "";

  loadData();
}

/* =========================
   STATUS ACTIONS
========================= */
async function markReceived(id) {
  await sb.from("Tracking")
    .update({
      returned: true,
      rts: false,
      date_received: new Date().toISOString().split("T")[0]
    })
    .eq("id", id);

  loadData();
}

async function markRTS(id) {
  await sb.from("Tracking")
    .update({
      returned: false,
      rts: true
    })
    .eq("id", id);

  loadData();
}

async function updateReceivedDate(id, value) {
  await sb.from("Tracking")
    .update({ date_received: value })
    .eq("id", id);

  loadData();
}

async function deleteEntry(id) {
  await sb.from("Tracking").delete().eq("id", id);
  loadData();
}

/* =========================
   RENDER
========================= */
function render() {
  const t = document.getElementById("table");
  t.innerHTML = "";

  data.forEach(d => {

    let statusClass = "";
    let statusText = "Pending";

    if (d.rts) {
      statusClass = "rtsCell";
      statusText = "RTS";
    } else if (d.returned) {
      statusClass = "signedCell";
      statusText = "Signed";
    } else {
      statusClass = "pendingCell";
    }

    t.innerHTML += `
      <tr>
        <td>${d.name || ""}</td>
        <td>${d.address || ""}</td>
        <td>${d.date_sent || ""}</td>

        <td class="${statusClass}">
          <input type="date"
            value="${d.date_received || ""}"
            onchange="updateReceivedDate('${d.id}', this.value)">
        </td>

        <td class="${statusClass}">
          ${statusText}
        </td>

        <td>
          <button class="green" onclick="markReceived('${d.id}')">
            Auto Received
          </button>

          <button class="red" onclick="markRTS('${d.id}')">
            RTS
          </button>

          <button class="gray" onclick="deleteEntry('${d.id}')">
            Delete
          </button>
        </td>
      </tr>
    `;
  });
}

/* =========================
   PIE CHART
========================= */
function updateChart() {
  const signed = data.filter(d => d.returned).length;
  const rts = data.filter(d => d.rts).length;
  const pending = data.length - signed - rts;

  const ctx = document.getElementById("pieChart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "pie",
    data: {
      labels: ["Signed", "Pending", "RTS"],
      datasets: [{
        data: [signed, pending, rts],
        backgroundColor: [
          "#1f7a3a",  // green
          "#8a6d1a",  // yellow
          "#7a1f1f"   // red
        ]
      }]
    }
  });
}

</script>

</body>
</html>
