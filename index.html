<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTM Tracker Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  margin: 0;
  padding: 15px;
}

h2 { margin-top: 0; }

input, button, select {
  padding: 10px;
  margin-top: 6px;
  width: 100%;
  box-sizing: border-box;
}

button {
  border: none;
  cursor: pointer;
  border-radius: 4px;
}

.green { background: #28a745; color: white; }
.red { background: #dc3545; color: white; }
.orange { background: #fd7e14; color: white; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  font-size: 14px;
}

th {
  background: #333;
  color: white;
}

/* STATUS COLORS */
.pending { background: #fff3cd; }
.signed { background: #d4edda; }
.unsigned { background: #f8d7da; }

td[contenteditable="true"] {
  background: #fffbe6;
}
</style>
</head>

<body>

<h2>TTM Tracker Pro</h2>

<input id="name" placeholder="Name *">
<input id="address" placeholder="Address *">
<input id="dateSent" type="date">

<button class="green" onclick="addEntry()">Save Entry</button>

<table>
<thead>
<tr>
  <th>Name</th>
  <th>Address</th>
  <th>Sent</th>
  <th>Received</th>
  <th>RTS</th>
  <th>Auto</th>
  <th>Signature</th>
  <th>Actions</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script>
const sb = window.supabase.createClient(
  "https://aeezsewfoozizduzuidv.supabase.co",
  "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz"
);

let data = [];

/* LOAD */
async function loadData() {
  const { data: rows, error } = await sb
    .from("Tracking")
    .select("*")
    .order("created_at", { ascending: false });

  if (!error) {
    data = rows || [];
    render();
  } else {
    console.error(error);
  }
}

/* ADD */
async function addEntry() {
  const name = document.getElementById("name").value.trim();
  const address = document.getElementById("address").value.trim();
  const date_sent =
    document.getElementById("dateSent").value ||
    new Date().toISOString().split("T")[0];

  if (!name || !address) {
    alert("Name and Address required");
    return;
  }

  await sb.from("Tracking").insert([{
    name,
    address,
    date_sent,
    date_received: null,
    returned: false,
    rts: null,
    received_auto: null,
    signature_status: "pending"
  }]);

  document.getElementById("name").value = "";
  document.getElementById("address").value = "";
  document.getElementById("dateSent").value = "";

  loadData();
}

/* UPDATE FIELD */
async function updateField(id, field, value) {
  await sb.from("Tracking").update({ [field]: value }).eq("id", id);
}

/* SIGNATURE UPDATE */
async function setSignature(id, value) {
  await updateField(id, "signature_status", value);
  await updateField(id, "returned", true);
  loadData();
}

/* DELETE */
async function remove(id) {
  if (!confirm("Delete this entry?")) return;
  await sb.from("Tracking").delete().eq("id", id);
  loadData();
}

/* RENDER */
function render() {
  const tbody = document.getElementById("table");
  tbody.innerHTML = "";

  data.forEach(item => {
    const status = item.signature_status || "pending";

    const tr = document.createElement("tr");
    tr.className =
      status === "returned_signed" ? "signed" :
      status === "returned_unsigned" ? "unsigned" :
      "pending";

    tr.innerHTML = `
      <td contenteditable="true" onblur="updateField('${item.id}','name',this.innerText)">
        ${item.name || ""}
      </td>

      <td contenteditable="true" onblur="updateField('${item.id}','address',this.innerText)">
        ${item.address || ""}
      </td>

      <td>
        <input type="date" value="${item.date_sent || ""}"
        onchange="updateField('${item.id}','date_sent',this.value)">
      </td>

      <td>
        <input type="date" value="${item.date_received || ""}"
        onchange="updateField('${item.id}','date_received',this.value)">
      </td>

      <td contenteditable="true" onblur="updateField('${item.id}','rts',this.innerText)">
        ${item.rts || ""}
      </td>

      <td>
        <select onchange="updateField('${item.id}','received_auto',this.value)">
          <option value="">-</option>
          <option value="Yes" ${item.received_auto==="Yes"?"selected":""}>Yes</option>
          <option value="No" ${item.received_auto==="No"?"selected":""}>No</option>
        </select>
      </td>

      <td>
        ${status}
      </td>

      <td>
        <button class="green" onclick="setSignature('${item.id}','returned_signed')">
          Signed
        </button>

        <button class="orange" onclick="setSignature('${item.id}','returned_unsigned')">
          Not Signed
        </button>

        <button class="red" onclick="remove('${item.id}')">
          Delete
        </button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

loadData();
</script>

</body>
</html>
