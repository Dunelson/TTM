<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTM Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; margin: 0; padding: 15px; background: #f4f6f8; }
input, select { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; }

.dateInput, .known-input { font-size: 12px; padding: 4px; }

.summary { width: 70%; margin: 10px auto; background: white; text-align: center; border-collapse: collapse; }
.summary td { border: 1px solid #ddd; padding: 6px; font-size: 12px; }
.chart-wrap { max-width: 220px; margin: 10px auto; }

table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
th, td { border: 1px solid #ddd; padding: 6px; font-size: 13px; text-align: left; }

.row-pending { background: #ffea7a; }
.row-received { background: #c8f7d2; }
.row-rts { background: #ffc7c7; }
.row-unsigned { background: #cfe1ff; }

.actor { color: blue; cursor: pointer; text-decoration: underline; }
.actor:hover { color: darkblue; }

.deleteBtn { background: #b3261e; color: white; padding: 4px 8px; font-size: 12px; border: none; cursor: pointer; }

#actorModal {
  display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: white; padding: 20px; border: 1px solid #666; box-shadow: 0 4px 25px rgba(0,0,0,0.4);
  max-width: 90%; max-height: 80vh; overflow-y: auto; z-index: 1000; border-radius: 8px;
}
.result-item {
  padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; cursor: pointer;
}
.result-item:hover { background: #e6f0ff; }
</style>
</head>
<body>
<h2>TTM Tracker</h2>

<table class="summary">
  <tr>
    <td>Pending</td><td id="sumPending">0</td>
    <td>Received</td><td id="sumReceived">0</td>
    <td>RTS</td><td id="sumRTS">0</td>
    <td>Unsigned</td><td id="sumUnsigned">0</td>
  </tr>
</table>
<div class="chart-wrap"><canvas id="pieChart"></canvas></div>

<input id="name" placeholder="Name">
<select id="role_type">
  <option value="">Role Type</option>
  <option value="Actor">Actor</option>
  <option value="Director">Director</option>
  <option value="Producer">Producer</option>
  <option value="Composer">Composer</option>
</select>
<input id="known_for" placeholder="Known For">
<input id="address" placeholder="Address">
<input id="dateSent" type="date">

<button onclick="addEntry()" style="background:#28a745;color:white;width:100%;padding:10px;">Save Entry</button>

<input id="search" placeholder="Search..." oninput="render()" style="margin-top:12px;">

<hr>

<table>
<thead>
<tr>
  <th>Name</th>
  <th>Role Type</th>
  <th>Known For</th>
  <th>Address</th>
  <th>Sent</th>
  <th>Received</th>
  <th>Status</th>
  <th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div id="actorModal">
  <h3 id="modalName">Select Correct Person</h3>
  <div id="modalContent">Loading...</div>
  <button onclick="closeModal()" style="margin-top:15px;">Close</button>
</div>

<script>
const sb = window.supabase.createClient(
  "https://aeezsewfoozizduzuidv.supabase.co",
  "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz"
);

const TMDB_API_KEY = "d4656a893658ed711bcadef18dc23300";   // ← CHANGE THIS

let data = [];
let chart;
let currentRowId = null;

// ==================== LOAD ====================
async function loadData() {
  const { data: rows } = await sb.from("Tracking").select("*").order("created_at", { ascending: false });
  data = rows || [];
  render();
  updateStats();
}
loadData();

// ==================== ADD ====================
async function addEntry() {
  const name = document.getElementById("name").value.trim();
  const role_type = document.getElementById("role_type").value;
  const known_for = document.getElementById("known_for").value.trim();
  const address = document.getElementById("address").value.trim();
  const date_sent = document.getElementById("dateSent").value;

  if (!name || !address) return alert("Name and Address required");

  await sb.from("Tracking").insert([{ name, role_type, known_for, address, date_sent, status: "pending" }]);
  clearForm();
  loadData();
}

function clearForm() {
  document.getElementById("name").value = "";
  document.getElementById("role_type").value = "";
  document.getElementById("known_for").value = "";
  document.getElementById("address").value = "";
  document.getElementById("dateSent").value = "";
}

// ==================== UPDATES ====================
async function updateRoleType(id, value) {
  await sb.from("Tracking").update({ role_type: value }).eq("id", id);
  loadData();
}
async function updateKnownFor(id, value) {
  await sb.from("Tracking").update({ known_for: value }).eq("id", id);
  loadData();
}
async function updateStatus(id, status) {
  const update = { status };
  if (status === "received") update.date_received = new Date().toISOString().split("T")[0];
  await sb.from("Tracking").update(update).eq("id", id);
  loadData();
}
async function updateDate(id, value) {
  await sb.from("Tracking").update({ date_received: value || null }).eq("id", id);
  loadData();
}
async function deleteEntry(id) {
  if (confirm("Delete?")) {
    await sb.from("Tracking").delete().eq("id", id);
    loadData();
  }
}

// ==================== RENDER ====================
function render() {
  const search = document.getElementById("search").value.toLowerCase().trim();
  const filtered = data.filter(d => 
    (d.name || "").toLowerCase().includes(search) ||
    (d.role_type || "").toLowerCase().includes(search) ||
    (d.known_for || "").toLowerCase().includes(search) ||
    (d.address || "").toLowerCase().includes(search)
  );

  const tbody = document.getElementById("table");
  tbody.innerHTML = "";

  filtered.forEach(d => {
    const status = d.status || "pending";
    tbody.innerHTML += `
      <tr class="row-${status}">
        <td class="actor" data-id="${d.id}" data-name="${d.name}">${d.name || ""}</td>
        <td>
          <select onchange="updateRoleType('${d.id}', this.value)">
            <option value="">—</option>
            <option value="Actor" ${d.role_type==="Actor"?"selected":""}>Actor</option>
            <option value="Director" ${d.role_type==="Director"?"selected":""}>Director</option>
            <option value="Producer" ${d.role_type==="Producer"?"selected":""}>Producer</option>
            <option value="Composer" ${d.role_type==="Composer"?"selected":""}>Composer</option>
          </select>
        </td>
        <td><input type="text" class="known-input" value="${d.known_for || ''}" onchange="updateKnownFor('${d.id}', this.value)"></td>
        <td>${d.address || ""}</td>
        <td>${d.date_sent || ""}</td>
        <td><input class="dateInput" type="date" value="${d.date_received || ""}" data-id="${d.id}" data-action="date"></td>
        <td>
          <select data-id="${d.id}" data-action="status">
            <option value="pending" ${status==="pending"?"selected":""}>Pending</option>
            <option value="received" ${status==="received"?"selected":""}>Received</option>
            <option value="rts" ${status==="rts"?"selected":""}>RTS</option>
            <option value="unsigned" ${status==="unsigned"?"selected":""}>Unsigned</option>
          </select>
        </td>
        <td><button class="deleteBtn" data-id="${d.id}" data-action="delete">Delete</button></td>
      </tr>
    `;
  });
}

// ==================== TMDB SEARCH ====================
async function showActorInfo(rowId, name) {
  currentRowId = rowId;
  document.getElementById("modalName").textContent = `Matches for: ${name}`;
  document.getElementById("modalContent").innerHTML = "Searching TMDB...";
  document.getElementById("actorModal").style.display = "block";

  console.log("Searching for:", name);

  try {
    const response = await fetch(
      `https://api.themoviedb.org/3/search/person?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(name)}`
    );
    const result = await response.json();

    console.log("TMDB Response:", result);

    if (!result.results || result.results.length === 0) {
      document.getElementById("modalContent").innerHTML = `<p>No results found for "${name}"</p>`;
      return;
    }

    let html = "";
    result.results.slice(0, 6).forEach(person => {
      const dept = person.known_for_department || "Unknown";
      html += `
        <div class="result-item" onclick="selectAndSave('${person.id}', '${person.name.replace(/'/g, "\\'")}', '${dept}')">
          <strong>${person.name}</strong> — ${dept}
        </div>`;
    });

    document.getElementById("modalContent").innerHTML = html;

  } catch (err) {
    console.error("TMDB Error:", err);
    document.getElementById("modalContent").innerHTML = `<p style="color:red;">Error: Could not connect to TMDB.<br>Check your API key.</p>`;
  }
}

// ==================== SAVE SELECTED PERSON ====================
async function selectAndSave(tmdbId, correctName, department) {
  console.log("Attempting to save:", { tmdbId, correctName, department, rowId: currentRowId });

  if (!currentRowId) {
    alert("Error: No row selected");
    return;
  }

  const roleType = (department === "Acting") ? "Actor" : 
                   (department === "Directing") ? "Director" : department;

  try {
    const { error } = await sb.from("Tracking").update({
      name: correctName,
      role_type: roleType,
      tmdb_id: tmdbId
    }).eq("id", currentRowId);

    if (error) throw error;

    console.log("Save successful!");
    alert(`✅ Saved successfully: ${correctName}`);
    closeModal();
    loadData();

  } catch (err) {
    console.error("Save failed:", err);
    alert("❌ Failed to save to database. Check console for details.");
  }
}

function closeModal() {
  document.getElementById("actorModal").style.display = "none";
  currentRowId = null;
}

// ==================== EVENTS ====================
document.addEventListener("click", (e) => {
  if (e.target.classList.contains("actor")) {
    const rowId = e.target.dataset.id;
    const name = e.target.dataset.name;
    if (rowId && name) showActorInfo(rowId, name);
  }

  if (e.target.dataset.action === "delete") {
    deleteEntry(e.target.dataset.id);
  }
});

document.addEventListener("change", (e) => {
  const id = e.target.dataset.id;
  const action = e.target.dataset.action;
  if (action === "status") updateStatus(id, e.target.value);
  if (action === "date") updateDate(id, e.target.value);
});

// ==================== STATS ====================
function updateStats() {
  const pending = data.filter(d => (d.status||"pending") === "pending").length;
  const received = data.filter(d => d.status === "received").length;
  const rts = data.filter(d => d.status === "rts").length;
  const unsigned = data.filter(d => d.status === "unsigned").length;

  document.getElementById("sumPending").innerText = pending;
  document.getElementById("sumReceived").innerText = received;
  document.getElementById("sumRTS").innerText = rts;
  document.getElementById("sumUnsigned").innerText = unsigned;

  const ctx = document.getElementById("pieChart");
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: "pie",
    data: {
      labels: ["Received", "Pending", "RTS", "Unsigned"],
      datasets: [{ data: [received, pending, rts, unsigned], backgroundColor: ["#1f8f3a","#ffea7a","#b3261e","#1e5bb3"] }]
    }
  });
}
</script>
</body>
</html>
