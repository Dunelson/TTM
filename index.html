<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTM Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; margin: 0; padding: 15px; background: #f4f6f8; }
input, select { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; }

.dateInput { width: 130px; font-size: 12px; padding: 4px; }
.known-input { width: 180px; font-size: 12px; padding: 3px; }

.summary { width: 70%; margin: 10px auto; background: white; text-align: center; border-collapse: collapse; }
.summary td { border: 1px solid #ddd; padding: 6px; font-size: 12px; }
.chart-wrap { max-width: 220px; margin: 10px auto; }

table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
th, td { border: 1px solid #ddd; padding: 6px; font-size: 13px; }

.row-pending { background: #ffea7a; }
.row-received { background: #c8f7d2; }
.row-rts { background: #ffc7c7; }
.row-unsigned { background: #cfe1ff; }

.actor { color: blue; cursor: pointer; text-decoration: underline; }
.actor:hover { color: darkblue; }

.deleteBtn {
  background: #b3261e; color: white; padding: 4px 8px; font-size: 12px; border: none; cursor: pointer;
}

#actorModal {
  display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: white; padding: 20px; border: 1px solid #ccc; 
  box-shadow: 0 4px 20px rgba(0,0,0,0.3); max-width: 92%; max-height: 88vh; overflow-y: auto; z-index: 1000;
}
.result-item {
  border: 1px solid #ddd; padding: 12px; margin-bottom: 12px; border-radius: 6px;
}
</style>
</head>
<body>
<h2>TTM Tracker</h2>

<table class="summary">
  <tr>
    <td>Pending</td><td id="sumPending">0</td>
    <td>Received</td><td id="sumReceived">0</td>
    <td>RTS</td><td id="sumRTS">0</td>
    <td>Unsigned</td><td id="sumUnsigned">0</td>
  </tr>
</table>
<div class="chart-wrap"><canvas id="pieChart"></canvas></div>

<!-- INPUT FORM -->
<input id="name" placeholder="Name">
<select id="role_type">
  <option value="">Role Type (optional)</option>
  <option value="Actor">Actor</option>
  <option value="Director">Director</option>
  <option value="Producer">Producer</option>
  <option value="Writer">Writer</option>
  <option value="Executive Producer">Executive Producer</option>
  <option value="Cinematographer">Cinematographer</option>
</select>
<input id="known_for" placeholder="Known For (e.g. John Wick)">
<input id="address" placeholder="Address">
<input id="dateSent" type="date">

<button onclick="addEntry()" style="background:#28a745;color:white;width:100%;">Save Entry</button>

<input id="search" placeholder="Search..." oninput="render()" style="margin-top:12px;">

<hr>

<table>
<thead>
<tr>
  <th>Name</th>
  <th>Role Type</th>
  <th>Known For</th>
  <th>Address</th>
  <th>Sent</th>
  <th>Received</th>
  <th>Status</th>
  <th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<!-- Modal -->
<div id="actorModal">
  <h3 id="modalName">Select Correct Person</h3>
  <div id="modalContent">Searching TMDB...</div>
  <button onclick="closeModal()" style="margin-top:15px;">Close</button>
</div>

<script>
const sb = window.supabase.createClient(
  "https://aeezsewfoozizduzuidv.supabase.co",
  "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz"
);

const TMDB_API_KEY = "d4656a893658ed711bcadef18dc23300";   // ←←← PUT YOUR KEY HERE

let data = [];
let chart;
let currentRowId = null;

/* ========================= LOAD ========================= */
async function loadData() {
  const { data: rows } = await sb.from("Tracking")
    .select("*")
    .order("created_at", { ascending: false });
  data = rows || [];
  render();
  updateStats();
}
loadData();

/* ========================= ADD ========================= */
async function addEntry() {
  const name = document.getElementById("name").value.trim();
  const role_type = document.getElementById("role_type").value;
  const known_for = document.getElementById("known_for").value.trim();
  const address = document.getElementById("address").value.trim();
  const date_sent = document.getElementById("dateSent").value;

  if (!name || !address) return alert("Name and Address are required");

  await sb.from("Tracking").insert([{
    name, role_type, known_for, address, date_sent, status: "pending"
  }]);

  clearForm();
  loadData();
}

function clearForm() {
  document.getElementById("name").value = "";
  document.getElementById("role_type").value = "";
  document.getElementById("known_for").value = "";
  document.getElementById("address").value = "";
  document.getElementById("dateSent").value = "";
}

/* ========================= UPDATES ========================= */
async function updateRoleType(id, value) {
  await sb.from("Tracking").update({ role_type: value }).eq("id", id);
  loadData();
}
async function updateKnownFor(id, value) {
  await sb.from("Tracking").update({ known_for: value }).eq("id", id);
  loadData();
}
async function updateStatus(id, status) {
  const update = { status };
  if (status === "received") update.date_received = new Date().toISOString().split("T")[0];
  await sb.from("Tracking").update(update).eq("id", id);
  loadData();
}
async function updateDate(id, value) {
  await sb.from("Tracking").update({ date_received: value || null }).eq("id", id);
  loadData();
}
async function deleteEntry(id) {
  if (confirm("Delete this entry?")) {
    await sb.from("Tracking").delete().eq("id", id);
    loadData();
  }
}

/* ========================= RENDER ========================= */
function render() {
  const search = (document.getElementById("search").value || "").toLowerCase().trim();

  const filtered = data.filter(d =>
    (d.name || "").toLowerCase().includes(search) ||
    (d.role_type || "").toLowerCase().includes(search) ||
    (d.known_for || "").toLowerCase().includes(search) ||
    (d.address || "").toLowerCase().includes(search)
  );

  const t = document.getElementById("table");
  t.innerHTML = "";

  filtered.forEach(d => {
    const status = d.status || "pending";
    t.innerHTML += `
      <tr class="row-${status}">
        <td class="actor" data-id="${d.id}" data-name="${d.name}" data-role="${d.role_type || ''}" 
            data-known="${d.known_for || ''}" data-tmdb="${d.tmdb_id || ''}">
          ${d.name || ""}
        </td>
        <td>
          <select onchange="updateRoleType('${d.id}', this.value)">
            <option value="">—</option>
            <option value="Actor" ${d.role_type==="Actor"?"selected":""}>Actor</option>
            <option value="Director" ${d.role_type==="Director"?"selected":""}>Director</option>
            <option value="Producer" ${d.role_type==="Producer"?"selected":""}>Producer</option>
            <option value="Writer" ${d.role_type==="Writer"?"selected":""}>Writer</option>
            <option value="Executive Producer" ${d.role_type==="Executive Producer"?"selected":""}>Exec Producer</option>
          </select>
        </td>
        <td>
          <input type="text" class="known-input" value="${d.known_for || ''}" 
                 onchange="updateKnownFor('${d.id}', this.value)">
        </td>
        <td>${d.address || ""}</td>
        <td>${d.date_sent || ""}</td>
        <td>
          <input class="dateInput" type="date" value="${d.date_received || ""}"
                 data-id="${d.id}" data-action="date">
        </td>
        <td>
          <select data-id="${d.id}" data-action="status">
            <option value="pending" ${status==="pending"?"selected":""}>Pending</option>
            <option value="received" ${status==="received"?"selected":""}>Received</option>
            <option value="rts" ${status==="rts"?"selected":""}>RTS</option>
            <option value="unsigned" ${status==="unsigned"?"selected":""}>Unsigned</option>
          </select>
        </td>
        <td>
          <button class="deleteBtn" data-id="${d.id}" data-action="delete">Delete</button>
        </td>
      </tr>
    `;
  });
}

/* ========================= TMDB MODAL ========================= */
async function showActorInfo(rowId, name, role_type = "", known_for = "", tmdb_id = "") {
  currentRowId = rowId;
  const modalContent = document.getElementById("modalContent");
  const modalName = document.getElementById("modalName");

  modalName.textContent = `Select correct person for: ${name}`;
  modalContent.innerHTML = "Searching TMDB...";
  document.getElementById("actorModal").style.display = "block";

  let query = name;
  if (role_type || known_for) query = [name, role_type, known_for].filter(Boolean).join(" ");

  try {
    let res = await fetch(`https://api.themoviedb.org/3/search/person?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}`);
    let json = await res.json();

    // Fallback search
    if ((!json.results || json.results.length === 0) && query !== name) {
      res = await fetch(`https://api.themoviedb.org/3/search/person?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(name)}`);
      json = await res.json();
    }

    if (!json.results || json.results.length === 0) {
      modalContent.innerHTML = `<p>No results found for "${name}".</p>`;
      return;
    }

    let html = `<p><strong>Choose the correct match:</strong></p>`;

    for (let person of json.results.slice(0, 5)) {
      const dept = person.known_for_department || "Unknown";
      const known = person.known_for ? person.known_for.slice(0, 3).map(k => k.title || k.name).join(", ") : "";

      html += `
        <div class="result-item">
          <strong>${person.name}</strong> — ${dept}<br>
          <small>${known}</small><br><br>
          <button onclick="selectPerson('${person.id}', '${person.name.replace(/'/g, "\\'")}', '${dept}')">
            Select This Person
          </button>
        </div>`;
    }

    modalContent.innerHTML = html;

  } catch (err) {
    console.error(err);
    modalContent.innerHTML = `<p style="color:red;">Error loading data from TMDB.</p>`;
  }
}

/* Update row with selected TMDB person */
async function selectPerson(tmdbId, correctName, department) {
  if (!currentRowId) return;

  const roleType = (department === "Acting") ? "Actor" : department;

  await sb.from("Tracking").update({
    name: correctName,
    role_type: roleType,
    tmdb_id: tmdbId
  }).eq("id", currentRowId);

  closeModal();
  loadData();
  alert(`✅ Updated to: ${correctName}`);
}

function closeModal() {
  document.getElementById("actorModal").style.display = "none";
  currentRowId = null;
}

/* ========================= EVENTS ========================= */
document.addEventListener("click", (e) => {
  if (e.target.classList.contains("actor")) {
    const rowId = e.target.dataset.id;
    const name = e.target.dataset.name;
    const role = e.target.dataset.role;
    const known = e.target.dataset.known;
    const tmdb = e.target.dataset.tmdb;
    showActorInfo(rowId, name, role, known, tmdb);
  }

  const id = e.target.dataset.id;
  const action = e.target.dataset.action;
  if (action === "delete") deleteEntry(id);
});

document.addEventListener("change", (e) => {
  const id = e.target.dataset.id;
  const action = e.target.dataset.action;
  if (action === "status") updateStatus(id, e.target.value);
  if (action === "date") updateDate(id, e.target.value);
});

/* ========================= STATS ========================= */
function updateStats() {
  const pending = data.filter(d => (d.status||"pending") === "pending").length;
  const received = data.filter(d => d.status === "received").length;
  const rts = data.filter(d => d.status === "rts").length;
  const unsigned = data.filter(d => d.status === "unsigned").length;

  document.getElementById("sumPending").innerText = pending;
  document.getElementById("sumReceived").innerText = received;
  document.getElementById("sumRTS").innerText = rts;
  document.getElementById("sumUnsigned").innerText = unsigned;

  const ctx = document.getElementById("pieChart");
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: "pie",
    data: {
      labels: ["Received", "Pending", "RTS", "Unsigned"],
      datasets: [{
        data: [received, pending, rts, unsigned],
        backgroundColor: ["#1f8f3a", "#ffea7a", "#b3261e", "#1e5bb3"]
      }]
    }
  });
}
</script>
</body>
</html>
