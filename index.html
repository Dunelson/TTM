<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTM Tracker Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  margin: 0;
  padding: 15px;
}

h2 { margin-top: 0; }

input, button, select {
  padding: 10px;
  margin-top: 6px;
  width: 100%;
  box-sizing: border-box;
}

button {
  border: none;
  cursor: pointer;
  border-radius: 4px;
}

.green { background: #28a745; color: white; }
.red { background: #dc3545; color: white; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  font-size: 14px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: left;
}

th {
  background: #333;
  color: white;
}

.pending { background: #ffe5e5; }
.returned { background: #e6ffe6; }

td[contenteditable="true"] {
  background: #fffbe6;
}
</style>
</head>

<body>

<h2>TTM Tracker Pro</h2>

<input id="name" placeholder="Name *">
<input id="address" placeholder="Address *">
<input id="dateSent" type="date">

<button class="green" onclick="addEntry()">Save Entry</button>

<table>
<thead>
<tr>
  <th>Name</th>
  <th>Address</th>
  <th>Sent</th>
  <th>Received</th>
  <th>RTS</th>
  <th>Auto</th>
  <th>Status</th>
  <th>Actions</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script>
const sb = window.supabase.createClient(
  "https://aeezsewfoozizduzuidv.supabase.co",
  "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz"
);

let data = [];

/* =========================
   LOAD
========================= */
async function loadData() {
  const { data: rows, error } = await sb
    .from("Tracking")
    .select("*")
    .order("created_at", { ascending: false });

  if (!error) {
    data = rows || [];
    render();
  } else {
    console.error(error);
  }
}

/* =========================
   ADD
========================= */
async function addEntry() {
  const name = document.getElementById("name").value.trim();
  const address = document.getElementById("address").value.trim();
  const date_sent =
    document.getElementById("dateSent").value ||
    new Date().toISOString().split("T")[0];

  if (!name || !address) {
    alert("Name and Address required");
    return;
  }

  await sb.from("Tracking").insert([{
    name,
    address,
    date_sent,
    date_received: null,
    returned: false,
    rts: null,
    received_auto: null
  }]);

  document.getElementById("name").value = "";
  document.getElementById("address").value = "";
  document.getElementById("dateSent").value = "";

  loadData();
}

/* =========================
   UPDATE
========================= */
async function updateField(id, field, value) {
  await sb
    .from("Tracking")
    .update({ [field]: value })
    .eq("id", id);
}

/* =========================
   TOGGLE RETURN
========================= */
async function toggleReturned(item) {
  await updateField(item.id, "returned", !item.returned);
  loadData();
}

/* =========================
   DELETE
========================= */
async function remove(id) {
  if (!confirm("Delete this entry?")) return;

  await sb
    .from("Tracking")
    .delete()
    .eq("id", id);

  loadData();
}

/* =========================
   RENDER
========================= */
function render() {
  const tbody = document.getElementById("table");
  tbody.innerHTML = "";

  data.forEach(item => {
    const tr = document.createElement("tr");
    tr.className = item.returned ? "returned" : "pending";

    tr.innerHTML = `
      <td contenteditable="true" onblur="updateField('${item.id}','name',this.innerText)">
        ${item.name || ""}
      </td>

      <td contenteditable="true" onblur="updateField('${item.id}','address',this.innerText)">
        ${item.address || ""}
      </td>

      <td>
        <input type="date" value="${item.date_sent || ""}"
        onchange="updateField('${item.id}','date_sent',this.value)">
      </td>

      <td>
        <input type="date" value="${item.date_received || ""}"
        onchange="updateField('${item.id}','date_received',this.value)">
      </td>

      <td>
        <select onchange="updateField('${item.id}','rts',this.value)">
          <option value="">-</option>
          <option value="Yes" ${item.rts === "Yes" ? "selected" : ""}>Yes</option>
          <option value="No" ${item.rts === "No" ? "selected" : ""}>No</option>
          <option value="Partial" ${item.rts === "Partial" ? "selected" : ""}>Partial</option>
        </select>
      </td>

      <td>
        <select onchange="updateField('${item.id}','received_auto',this.value)">
          <option value="">-</option>
          <option value="Yes" ${item.received_auto === "Yes" ? "selected" : ""}>Yes</option>
          <option value="No" ${item.received_auto === "No" ? "selected" : ""}>No</option>
        </select>
      </td>

      <td>
        ${item.returned ? "✅ Returned" : "⏳ Pending"}
      </td>

      <td>
        <button class="green" onclick='toggleReturned(${JSON.stringify(item)})'>Toggle</button>
        <button class="red" onclick="remove('${item.id}')">Delete</button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

loadData();
</script>

</body>
</html>
