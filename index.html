<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTM Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 15px;
  background: #f4f6f8;
}

h2 { margin-bottom: 10px; }

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
}

button {
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

.green { background: #28a745; color: white; }
.red { background: #dc3545; color: white; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: white;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  font-size: 14px;
}

th {
  background: #222;
  color: white;
}

/* modal */
.modal {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
}

.modal-content {
  background:white;
  margin:10% auto;
  padding:15px;
  width:90%;
  max-width:500px;
  border-radius:8px;
}
</style>
</head>

<body>

<h2>TTM Tracker</h2>

<input id="name" placeholder="Name">
<input id="address" placeholder="Address">
<input id="dateSent" type="date">

<button class="green" onclick="addEntry()">Save Entry</button>

<hr>

<table>
<thead>
<tr>
  <th>Name</th>
  <th>Address</th>
  <th>Sent</th>
  <th>Status</th>
  <th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<!-- ACTOR MODAL -->
<div id="actorModal" class="modal" onclick="closeActor()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 id="actorName"></h3>
    <div id="movieList">Loading...</div>
    <button class="red" onclick="closeActor()">Close</button>
  </div>
</div>

<script>

/* =========================
   SUPABASE
========================= */
const sb = window.supabase.createClient(
  "https://aeezsewfoozizduzuidv.supabase.co",
  "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz"
);

/* =========================
   TMDB CONFIG
========================= */
const TMDB_API_KEY = "d4656a893658ed711bcadef18dc23300";
const TMDB_READ_TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJkNDY1NmE4OTM2NThlZDcxMWJjYWRlZjE4ZGMyMzMwMCIsIm5iZiI6MTc3NzU1MjU3Ni43NTksInN1YiI6IjY5ZjM0Y2MwMmQxYjkxYWM1ZTg3YjBlNCIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.Cta30ot0SpEJPn74W1yVbbV-vOPawrWMQSUejjGlN0c";

const actorCache = {};

/* =========================
   LOAD DATA
========================= */
let data = [];

async function loadData() {
  const { data: rows, error } = await sb
    .from("Tracking")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error("Load error:", error);
    return;
  }

  data = rows || [];
  render();
}

loadData();

/* =========================
   ADD ENTRY
========================= */
async function addEntry() {
  const name = document.getElementById("name").value.trim();
  const address = document.getElementById("address").value.trim();
  const date_sent = document.getElementById("dateSent").value;

  if (!name || !address) {
    alert("Missing fields");
    return;
  }

  const { error } = await sb.from("Tracking").insert([{
    name,
    address,
    date_sent,
    returned: false
  }]);

  if (error) {
    console.error("Insert error:", error);
    alert(error.message);
    return;
  }

  document.getElementById("name").value = "";
  document.getElementById("address").value = "";
  document.getElementById("dateSent").value = "";

  loadData();
}

/* =========================
   SAFE DELETE
========================= */
async function deleteEntry(id) {
  const { error } = await sb
    .from("Tracking")
    .delete()
    .eq("id", id);

  if (error) {
    console.error("Delete error:", error);
    alert(error.message);
    return;
  }

  loadData();
}

/* =========================
   ACTOR LOOKUP
========================= */
async function openActor(name) {
  document.getElementById("actorModal").style.display = "block";
  document.getElementById("actorName").innerText = name;
  document.getElementById("movieList").innerText = "Loading...";

  if (actorCache[name]) {
    renderMovies(actorCache[name]);
    return;
  }

  try {
    const search = await fetch(
      `https://api.themoviedb.org/3/search/person?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(name)}`
    );

    if (!search.ok) throw new Error("TMDB search failed");

    const searchData = await search.json();

    if (!searchData.results.length) {
      document.getElementById("movieList").innerText = "No actor found.";
      return;
    }

    const id = searchData.results[0].id;

    const credits = await fetch(
      `https://api.themoviedb.org/3/person/${id}/movie_credits?api_key=${TMDB_API_KEY}`
    );

    if (!credits.ok) throw new Error("TMDB credits failed");

    const creditsData = await credits.json();

    actorCache[name] = creditsData.cast || [];

    renderMovies(actorCache[name]);

  } catch (err) {
    console.error(err);
    document.getElementById("movieList").innerText = "Error loading data.";
  }
}

function renderMovies(movies) {
  const html = movies
    .sort((a,b) => (b.popularity || 0) - (a.popularity || 0))
    .slice(0, 15)
    .map(m => `🎬 ${m.title} (${m.release_date || "N/A"})`)
    .join("<br>");

  document.getElementById("movieList").innerHTML = html || "No movies found.";
}

function closeActor() {
  document.getElementById("actorModal").style.display = "none";
}

/* =========================
   RENDER TABLE
========================= */
function render() {
  const t = document.getElementById("table");
  t.innerHTML = "";

  data.forEach(d => {
    const safeName = encodeURIComponent(d.name || "");

    t.innerHTML += `
      <tr>
        <td style="color:blue;cursor:pointer"
            onclick="openActor(decodeURIComponent('${safeName}'))">
          ${d.name || ""}
        </td>

        <td>${d.address || ""}</td>
        <td>${d.date_sent || ""}</td>
        <td>${d.returned ? "Returned" : "Pending"}</td>

        <td>
          <button class="red" onclick="deleteEntry('${d.id}')">
            Delete
          </button>
        </td>
      </tr>
    `;
  });
}

</script>

</body>
</html>
