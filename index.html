<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTM Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 15px;
  background: #f4f6f8;
}

h2 { margin-bottom: 10px; }

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
}

button {
  border: none;
  border-radius: 4px;
  cursor: pointer;
  color: white;
}

/* brighter yellow */
.pending { background: #ffcc00; color: black; }
.received { background: #1f8f3a; }
.rts { background: #b3261e; }
.unsigned { background: #1e5bb3; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: white;
}

th, td {
  border: 1px solid #ddd;
  padding: 10px;
  font-size: 14px;
  vertical-align: middle;
}

th {
  background: #222;
  color: white;
}

/* make status column wider */
.statusCell {
  min-width: 120px;
  text-align: center;
  font-weight: bold;
}

/* full-row coloring */
.row-pending { background: #fffbcc; }
.row-received { background: #d6f5dd; }
.row-rts { background: #ffd6d6; }
.row-unsigned { background: #d6e6ff; }

/* chart */
.chart-wrap {
  max-width: 320px;
  margin: 10px auto;
}
</style>
</head>

<body>

<h2>TTM Tracker</h2>

<div class="chart-wrap">
  <canvas id="pieChart"></canvas>
</div>

<input id="name" placeholder="Name">
<input id="address" placeholder="Address">
<input id="dateSent" type="date">

<button onclick="addEntry()" style="background:#28a745;">Save Entry</button>

<hr>

<table>
<thead>
<tr>
  <th>Name</th>
  <th>Address</th>
  <th>Sent</th>
  <th>Received Date</th>
  <th>Status</th>
  <th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

/* =========================
   SUPABASE
========================= */
const sb = window.supabase.createClient(
  "https://aeezsewfoozizduzuidv.supabase.co",
  "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz"
);

/* =========================
   STATE
========================= */
let data = [];
let chart;

/* =========================
   LOAD
========================= */
async function loadData() {
  const { data: rows } = await sb.from("Tracking")
    .select("*")
    .order("created_at", { ascending: false });

  data = rows || [];
  render();
  updateChart();
}

loadData();

/* =========================
   ADD ENTRY
========================= */
async function addEntry() {
  const name = document.getElementById("name").value.trim();
  const address = document.getElementById("address").value.trim();
  const date_sent = document.getElementById("dateSent").value;

  if (!name || !address) return alert("Missing fields");

  await sb.from("Tracking").insert([{
    name,
    address,
    date_sent,
    status: "pending",
    date_received: null
  }]);

  document.getElementById("name").value = "";
  document.getElementById("address").value = "";
  document.getElementById("dateSent").value = "";

  loadData();
}

/* =========================
   STATUS UPDATE
========================= */
async function setStatus(id, status) {
  const update = { status };

  if (status === "received") {
    update.date_received = new Date().toISOString().split("T")[0];
  }

  await sb.from("Tracking")
    .update(update)
    .eq("id", id);

  loadData();
}

/* =========================
   DATE UPDATE
========================= */
async function updateDate(id, value) {
  await sb.from("Tracking")
    .update({ date_received: value })
    .eq("id", id);
}

/* =========================
   DELETE
========================= */
async function deleteEntry(id) {
  await sb.from("Tracking").delete().eq("id", id);
  loadData();
}

/* =========================
   RENDER
========================= */
function render() {
  const t = document.getElementById("table");
  t.innerHTML = "";

  data.forEach(d => {

    const status = d.status || "pending";

    t.innerHTML += `
      <tr class="row-${status}">

        <td>${d.name || ""}</td>
        <td>${d.address || ""}</td>
        <td>${d.date_sent || ""}</td>

        <td>
          <input type="date"
            value="${d.date_received || ""}"
            onchange="updateDate('${d.id}', this.value)">
        </td>

        <td class="statusCell">
          ${status.toUpperCase()}
        </td>

        <td>

          <select onchange="setStatus('${d.id}', this.value)">
            <option value="pending">Pending</option>
            <option value="received">Auto Received</option>
            <option value="rts">RTS</option>
            <option value="unsigned">Returned Unsigned</option>
          </select>

          <button style="background:#555;margin-top:5px"
            onclick="setStatus('${d.id}', 'pending')">
            Undo
          </button>

          <button style="background:#b3261e;margin-top:5px"
            onclick="deleteEntry('${d.id}')">
            Delete
          </button>

        </td>

      </tr>
    `;
  });
}

/* =========================
   CHART
========================= */
function updateChart() {
  const pending = data.filter(d => (d.status || "pending") === "pending").length;
  const received = data.filter(d => d.status === "received").length;
  const rts = data.filter(d => d.status === "rts").length;
  const unsigned = data.filter(d => d.status === "unsigned").length;

  const ctx = document.getElementById("pieChart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "pie",
    data: {
      labels: ["Received", "Pending", "RTS", "Unsigned"],
      datasets: [{
        data: [received, pending, rts, unsigned],
        backgroundColor: [
          "#1f8f3a",
          "#ffcc00",
          "#b3261e",
          "#1e5bb3"
        ]
      }]
    }
  });
}

</script>

</body>
</html>
