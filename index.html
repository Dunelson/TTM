<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTM Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 15px;
  background: #f4f6f8;
}

h2 { margin-bottom: 10px; }

/* inputs */
input {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
}

/* buttons removed except primary */
button {
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

/* compact summary table */
.summary {
  margin: 10px auto;
  width: 60%;
  text-align: center;
  background: white;
  border-collapse: collapse;
}

.summary td {
  padding: 6px;
  border: 1px solid #ddd;
  font-size: 13px;
}

/* chart */
.chart-wrap {
  max-width: 260px;
  margin: 10px auto;
}

/* table */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: white;
}

th, td {
  border: 1px solid #ddd;
  padding: 6px;
  font-size: 13px;
}

/* compact received date */
.receivedDate {
  width: 120px;
  font-size: 12px;
  padding: 4px;
}

/* status colors (FULL ROW) */
.row-pending { background: #ffea7a; }
.row-received { background: #c8f7d2; }
.row-rts { background: #ffc7c7; }
.row-unsigned { background: #cfe1ff; }

/* status select compact */
select {
  padding: 5px;
  font-size: 12px;
}

/* delete */
.deleteBtn {
  background: #b3261e;
  color: white;
  padding: 5px;
  font-size: 12px;
}
</style>
</head>

<body>

<h2>TTM Tracker</h2>

<!-- SUMMARY TABLE -->
<table class="summary">
  <tr>
    <td>Pending</td>
    <td id="sumPending">0</td>
    <td>Received</td>
    <td id="sumReceived">0</td>
    <td>RTS</td>
    <td id="sumRTS">0</td>
    <td>Unsigned</td>
    <td id="sumUnsigned">0</td>
  </tr>
</table>

<!-- PIE -->
<div class="chart-wrap">
  <canvas id="pieChart"></canvas>
</div>

<!-- INPUTS -->
<input id="name" placeholder="Name">
<input id="address" placeholder="Address">
<input id="dateSent" type="date">

<button onclick="addEntry()" style="background:#28a745;color:white;width:100%;padding:10px;margin-top:6px;">
Save Entry
</button>

<hr>

<table>
<thead>
<tr>
  <th>Name</th>
  <th>Address</th>
  <th>Sent</th>
  <th>Received</th>
  <th>Status</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script>

const sb = window.supabase.createClient(
  "https://aeezsewfoozizduzuidv.supabase.co",
  "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz"
);

let data = [];
let chart;

/* =========================
   LOAD
========================= */
async function loadData() {
  const { data: rows } = await sb.from("Tracking")
    .select("*")
    .order("created_at", { ascending: false });

  data = rows || [];
  render();
  updateAll();
}

loadData();

/* =========================
   ADD
========================= */
async function addEntry() {
  const name = document.getElementById("name").value.trim();
  const address = document.getElementById("address").value.trim();
  const date_sent = document.getElementById("dateSent").value;

  if (!name || !address) return alert("Missing fields");

  await sb.from("Tracking").insert([{
    name,
    address,
    date_sent,
    date_received: "",
    status: "pending"
  }]);

  document.getElementById("name").value = "";
  document.getElementById("address").value = "";
  document.getElementById("dateSent").value = "";

  loadData();
}

/* =========================
   STATUS UPDATE (CRITICAL FIX)
========================= */
async function updateStatus(id, status) {

  const update = { status };

  if (status === "received") {
    update.date_received = new Date().toISOString().split("T")[0];
  }

  await sb.from("Tracking")
    .update(update)
    .eq("id", id);

  loadData();
}

/* =========================
   DELETE
========================= */
async function deleteEntry(id) {
  await sb.from("Tracking").delete().eq("id", id);
  loadData();
}

/* =========================
   RENDER
========================= */
function render() {
  const t = document.getElementById("table");
  t.innerHTML = "";

  data.forEach(d => {

    const status = d.status || "pending";

    t.innerHTML += `
      <tr class="row-${status}">

        <td>${d.name || ""}</td>
        <td>${d.address || ""}</td>
        <td>${d.date_sent || ""}</td>

        <td>
          <input class="receivedDate"
            type="date"
            value="${d.date_received || ""}"
            onchange="updateStatus('${d.id}', '${status}')">
        </td>

        <td>
          <select onchange="updateStatus('${d.id}', this.value)">
            <option value="pending" ${status==="pending"?"selected":""}>Pending</option>
            <option value="received" ${status==="received"?"selected":""}>Auto Received</option>
            <option value="rts" ${status==="rts"?"selected":""}>RTS</option>
            <option value="unsigned" ${status==="unsigned"?"selected":""}>Returned Unsigned</option>
          </select>

          <button class="deleteBtn"
            onclick="deleteEntry('${d.id}')">
            Delete
          </button>
        </td>

      </tr>
    `;
  });
}

/* =========================
   SUMMARY + CHART FIXED
========================= */
function updateAll() {

  const pending = data.filter(d => (d.status||"pending")==="pending").length;
  const received = data.filter(d => d.status==="received").length;
  const rts = data.filter(d => d.status==="rts").length;
  const unsigned = data.filter(d => d.status==="unsigned").length;

  document.getElementById("sumPending").innerText = pending;
  document.getElementById("sumReceived").innerText = received;
  document.getElementById("sumRTS").innerText = rts;
  document.getElementById("sumUnsigned").innerText = unsigned;

  const ctx = document.getElementById("pieChart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "pie",
    data: {
      labels: ["Received", "Pending", "RTS", "Unsigned"],
      datasets: [{
        data: [received, pending, rts, unsigned],
        backgroundColor: [
          "#1f8f3a",
          "#ffea7a",
          "#b3261e",
          "#1e5bb3"
        ]
      }]
    }
  });
}

</script>

</body>
</html>
