<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTM Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 15px;
  background: #f4f6f8;
}

h2 { margin-bottom: 10px; }

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
}

button {
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

.green { background: #28a745; color: white; }
.red { background: #dc3545; color: white; }
.blue { background: #007bff; color: white; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: white;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  font-size: 14px;
}

th {
  background: #222;
  color: white;
}

/* modal */
.modal {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
}

.modal-content {
  background:white;
  margin:10% auto;
  padding:15px;
  width:90%;
  max-width:500px;
  border-radius:8px;
}

/* stats */
.stats {
  display:flex;
  gap:10px;
  margin:10px 0;
}

.card {
  flex:1;
  background:white;
  padding:10px;
  border-radius:6px;
  text-align:center;
}

/* chart */
.chart-wrap {
  max-width:300px;
  margin:10px auto;
}
</style>
</head>

<body>

<h2>TTM Tracker</h2>

<!-- STATS -->
<div class="stats">
  <div class="card" id="total">Total: 0</div>
  <div class="card" id="pending">Pending: 0</div>
  <div class="card" id="returned">Returned: 0</div>
</div>

<!-- CHART -->
<div class="chart-wrap">
  <canvas id="pieChart"></canvas>
</div>

<input id="name" placeholder="Name">
<input id="address" placeholder="Address">
<input id="dateSent" type="date">

<button class="green" onclick="addEntry()">Save Entry</button>

<hr>

<table>
<thead>
<tr>
  <th>Name</th>
  <th>Address</th>
  <th>Sent</th>
  <th>Received</th>
  <th>Status</th>
  <th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<!-- ACTOR MODAL -->
<div id="actorModal" class="modal" onclick="closeActor()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 id="actorName"></h3>
    <div id="movieList"></div>
    <button class="red" onclick="closeActor()">Close</button>
  </div>
</div>

<script>

/* =========================
   SUPABASE
========================= */
const sb = window.supabase.createClient(
  "https://aeezsewfoozizduzuidv.supabase.co",
  "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz"
);

/* =========================
   TMDB
========================= */
const TMDB_API_KEY = "d4656a893658ed711bcadef18dc23300";
const actorCache = {};

/* =========================
   STATE
========================= */
let data = [];
let chart;

/* =========================
   LOAD
========================= */
async function loadData() {
  const { data: rows } = await sb.from("Tracking").select("*").order("created_at", { ascending: false });
  data = rows || [];
  render();
  updateStats();
  updateChart();
}

loadData();

/* =========================
   ADD ENTRY
========================= */
async function addEntry() {
  const name = document.getElementById("name").value.trim();
  const address = document.getElementById("address").value.trim();
  const date_sent = document.getElementById("dateSent").value;

  if (!name || !address) return alert("Missing fields");

  await sb.from("Tracking").insert([{
    name,
    address,
    date_sent,
    date_received: null,
    returned: false
  }]);

  document.getElementById("name").value = "";
  document.getElementById("address").value = "";
  document.getElementById("dateSent").value = "";

  loadData();
}

/* =========================
   TOGGLE RETURNED
========================= */
async function toggle(id) {
  const item = data.find(d => d.id === id);
  if (!item) return;

  await sb.from("Tracking")
    .update({ returned: !item.returned })
    .eq("id", id);

  loadData();
}

/* =========================
   DELETE
========================= */
async function deleteEntry(id) {
  await sb.from("Tracking").delete().eq("id", id);
  loadData();
}

/* =========================
   RENDER
========================= */
function render() {
  const t = document.getElementById("table");
  t.innerHTML = "";

  data.forEach(d => {
    t.innerHTML += `
      <tr>
        <td onclick="openActor('${d.name}')"
            style="color:blue;cursor:pointer">
          ${d.name || ""}
        </td>
        <td>${d.address || ""}</td>
        <td>${d.date_sent || ""}</td>
        <td>${d.date_received || "-"}</td>
        <td>${d.returned ? "Returned" : "Pending"}</td>
        <td>
          <button class="blue" onclick="toggle('${d.id}')">
            Toggle
          </button>
          <button class="red" onclick="deleteEntry('${d.id}')">
            Delete
          </button>
        </td>
      </tr>
    `;
  });
}

/* =========================
   STATS
========================= */
function updateStats() {
  const total = data.length;
  const returned = data.filter(d => d.returned).length;
  const pending = total - returned;

  document.getElementById("total").innerText = `Total: ${total}`;
  document.getElementById("pending").innerText = `Pending: ${pending}`;
  document.getElementById("returned").innerText = `Returned: ${returned}`;
}

/* =========================
   PIE CHART
========================= */
function updateChart() {
  const returned = data.filter(d => d.returned).length;
  const pending = data.length - returned;

  const ctx = document.getElementById("pieChart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "pie",
    data: {
      labels: ["Returned", "Pending"],
      datasets: [{
        data: [returned, pending]
      }]
    }
  });
}

/* =========================
   ACTOR LOOKUP
========================= */
async function openActor(name) {
  document.getElementById("actorModal").style.display = "block";
  document.getElementById("actorName").innerText = name;
  document.getElementById("movieList").innerText = "Loading...";

  if (actorCache[name]) {
    renderMovies(actorCache[name]);
    return;
  }

  const res = await fetch(
    `https://api.themoviedb.org/3/search/person?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(name)}`
  );

  const json = await res.json();

  if (!json.results.length) {
    document.getElementById("movieList").innerText = "No actor found.";
    return;
  }

  const id = json.results[0].id;

  const credits = await fetch(
    `https://api.themoviedb.org/3/person/${id}/movie_credits?api_key=${TMDB_API_KEY}`
  );

  const cjson = await credits.json();

  actorCache[name] = cjson.cast || [];

  renderMovies(actorCache[name]);
}

function renderMovies(movies) {
  document.getElementById("movieList").innerHTML =
    movies.slice(0, 15)
      .map(m => `🎬 ${m.title} (${m.release_date || "N/A"})`)
      .join("<br>");
}

function closeActor() {
  document.getElementById("actorModal").style.display = "none";
}

</script>

</body>
</html>
