<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTM Analytics System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 15px;
  background: #f4f6f8;
}

h2 { margin: 0 0 10px 0; }

.dashboard {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 15px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  box-sizing: border-box;
}

button {
  border: none;
  cursor: pointer;
  border-radius: 4px;
}

.green { background: #28a745; color: white; }
.red { background: #dc3545; color: white; }
.orange { background: #fd7e14; color: white; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  font-size: 14px;
}

th {
  background: #333;
  color: white;
}

.pending { background: #fff3cd; }
.signed { background: #d4edda; }
.unsigned { background: #f8d7da; }

canvas {
  background: white;
  border-radius: 8px;
  margin-top: 15px;
  padding: 10px;
}

.section {
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>TTM Analytics Dashboard</h2>

<!-- DASHBOARD -->
<div class="dashboard">
  <div class="card"><h3 id="total">0</h3><small>Total</small></div>
  <div class="card"><h3 id="pending">0</h3><small>Pending</small></div>
  <div class="card"><h3 id="signed">0</h3><small>Signed</small></div>
  <div class="card"><h3 id="unsigned">0</h3><small>Unsigned</small></div>
</div>

<!-- INPUT -->
<input id="name" placeholder="Name *">
<input id="address" placeholder="Address *">
<input id="dateSent" type="date">
<button class="green" onclick="addEntry()">Save Entry</button>

<!-- CHARTS -->
<canvas id="statusChart" height="120"></canvas>
<canvas id="trendChart" height="120"></canvas>

<!-- LEADERBOARDS -->
<div class="section">
  <h3>⚡ Fast Response Leaderboard (≤ 30 days)</h3>
  <table>
    <thead><tr><th>Name</th><th>Days</th></tr></thead>
    <tbody id="fastBoard"></tbody>
  </table>
</div>

<div class="section">
  <h3>🐢 Slow Response Leaderboard (≥ 90 days)</h3>
  <table>
    <thead><tr><th>Name</th><th>Days</th></tr></thead>
    <tbody id="slowBoard"></tbody>
  </table>
</div>

<!-- MAIN TABLE -->
<table>
<thead>
<tr>
  <th>Name</th>
  <th>Address</th>
  <th>Sent</th>
  <th>Received</th>
  <th>Status</th>
  <th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
const sb = window.supabase.createClient(
  "https://aeezsewfoozizduzuidv.supabase.co",
  "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz"
);

let data = [];
let statusChart, trendChart;

/* LOAD */
async function loadData() {
  const { data: rows } = await sb
    .from("Tracking")
    .select("*")
    .order("created_at", { ascending: false });

  data = rows || [];

  render();
  updateDashboard();
  updateCharts();
  updateLeaderboards();
}

/* ADD (AUTO CLEAR FIXED) */
async function addEntry() {
  const nameEl = document.getElementById("name");
  const addressEl = document.getElementById("address");
  const dateEl = document.getElementById("dateSent");

  const name = nameEl.value.trim();
  const address = addressEl.value.trim();
  const date_sent = dateEl.value || new Date().toISOString().split("T")[0];

  if (!name || !address) return alert("Name and Address required");

  const { error } = await sb.from("Tracking").insert([{
    name,
    address,
    date_sent,
    returned: false,
    signature_status: "pending"
  }]);

  if (error) return alert(error.message);

  // CLEAR ONLY AFTER SUCCESS
  nameEl.value = "";
  addressEl.value = "";
  dateEl.value = "";

  loadData();
}

/* UPDATE */
async function updateField(id, field, value) {
  await sb.from("Tracking").update({ [field]: value }).eq("id", id);
}

/* STATUS */
async function setStatus(id, status) {
  await sb.from("Tracking").update({
    signature_status: status,
    returned: true
  }).eq("id", id);

  loadData();
}

/* DELETE */
async function remove(id) {
  if (!confirm("Delete entry?")) return;
  await sb.from("Tracking").delete().eq("id", id);
  loadData();
}

/* DASHBOARD */
function updateDashboard() {
  const total = data.length;
  const pending = data.filter(d => !d.returned).length;
  const signed = data.filter(d => d.signature_status === "returned_signed").length;
  const unsigned = data.filter(d => d.signature_status === "returned_unsigned").length;

  document.getElementById("total").innerText = total;
  document.getElementById("pending").innerText = pending;
  document.getElementById("signed").innerText = signed;
  document.getElementById("unsigned").innerText = unsigned;
}

/* CHARTS */
function updateCharts() {
  const signed = data.filter(d => d.signature_status === "returned_signed").length;
  const unsigned = data.filter(d => d.signature_status === "returned_unsigned").length;
  const pending = data.filter(d => !d.returned).length;

  if (statusChart) statusChart.destroy();
  statusChart = new Chart(document.getElementById("statusChart"), {
    type: "pie",
    data: {
      labels: ["Pending", "Signed", "Unsigned"],
      datasets: [{
        data: [pending, signed, unsigned],
        backgroundColor: ["#ffc107", "#28a745", "#dc3545"]
      }]
    }
  });

  const months = {};
  data.forEach(d => {
    if (!d.date_sent) return;
    const m = d.date_sent.slice(0,7);
    months[m] = (months[m] || 0) + 1;
  });

  const labels = Object.keys(months).sort();
  const values = labels.map(l => months[l]);

  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById("trendChart"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Sent per Month",
        data: values,
        borderColor: "#007bff",
        fill: false
      }]
    }
  });
}

/* LEADERBOARDS */
function updateLeaderboards() {
  const fast = [];
  const slow = [];

  data.forEach(d => {
    if (!d.returned || !d.date_sent || !d.date_received) return;

    const days = Math.floor(
      (new Date(d.date_received) - new Date(d.date_sent)) /
      (1000 * 60 * 60 * 24)
    );

    if (days <= 30) fast.push({ name: d.name, days });
    if (days >= 90) slow.push({ name: d.name, days });
  });

  fast.sort((a,b) => a.days - b.days);
  slow.sort((a,b) => b.days - a.days);

  document.getElementById("fastBoard").innerHTML =
    fast.map(x => `<tr><td>${x.name}</td><td>${x.days}</td></tr>`).join("");

  document.getElementById("slowBoard").innerHTML =
    slow.map(x => `<tr><td>${x.name}</td><td>${x.days}</td></tr>`).join("");
}

/* TABLE */
function render() {
  const tbody = document.getElementById("table");
  tbody.innerHTML = "";

  data.forEach(item => {
    const status = item.signature_status || "pending";

    const tr = document.createElement("tr");
    tr.className =
      status === "returned_signed" ? "signed" :
      status === "returned_unsigned" ? "unsigned" :
      "pending";

    tr.innerHTML = `
      <td>${item.name || ""}</td>
      <td>${item.address || ""}</td>
      <td>${item.date_sent || ""}</td>
      <td>
        <input type="date" value="${item.date_received || ""}"
        onchange="updateField('${item.id}','date_received',this.value)">
      </td>
      <td>${status}</td>
      <td>
        <button class="green" onclick="setStatus('${item.id}','returned_signed')">Signed</button>
        <button class="orange" onclick="setStatus('${item.id}','returned_unsigned')">Not Signed</button>
        <button class="red" onclick="remove('${item.id}')">Delete</button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

loadData();
setInterval(loadData, 30000);
</script>

</body>
</html>
