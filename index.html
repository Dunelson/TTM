<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTM Tracker App</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 15px;
  background: #f4f6f8;
}

h2 { margin: 0 0 10px 0; }

.dashboard {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 10px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  box-sizing: border-box;
}

button {
  border: none;
  cursor: pointer;
  border-radius: 4px;
}

.green { background: #28a745; color: white; }
.red { background: #dc3545; color: white; }
.orange { background: #fd7e14; color: white; }

.search {
  margin: 10px 0;
  padding: 10px;
  width: 100%;
  box-sizing: border-box;
  font-size: 14px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: white;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  font-size: 14px;
}

th {
  background: #333;
  color: white;
}

.pending { background: #fff3cd; }
.signed { background: #d4edda; }
.unsigned { background: #f8d7da; }

canvas {
  background: white;
  border-radius: 8px;
  margin-top: 10px;
  padding: 10px;
  max-height: 260px;
}

/* PROFILE MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  margin: 10% auto;
  padding: 20px;
  width: 90%;
  max-width: 500px;
  border-radius: 8px;
}
</style>
</head>

<body>

<h2>TTM Tracker App</h2>

<!-- DASHBOARD -->
<div class="dashboard">
  <div class="card"><h3 id="total">0</h3><small>Total</small></div>
  <div class="card"><h3 id="pending">0</h3><small>Pending</small></div>
  <div class="card"><h3 id="signed">0</h3><small>Signed</small></div>
  <div class="card"><h3 id="unsigned">0</h3><small>Unsigned</small></div>
</div>

<!-- INPUT -->
<input id="name" placeholder="Name *">
<input id="address" placeholder="Address *">
<input id="dateSent" type="date">
<button class="green" onclick="addEntry()">Save Entry</button>

<!-- SEARCH -->
<input class="search" id="search" placeholder="Search name or address..." oninput="render()">

<!-- TABLE -->
<table>
<thead>
<tr>
  <th>Name</th>
  <th>Address</th>
  <th>Sent</th>
  <th>Status</th>
  <th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<!-- CHARTS (BOTTOM) -->
<div class="section">
  <h3>📊 Analytics</h3>
  <canvas id="statusChart" height="120"></canvas>
  <canvas id="trendChart" height="120"></canvas>
</div>

<!-- LEADERBOARDS -->
<div class="section">
  <h3>⚡ Fast (≤30 days)</h3>
  <table><tbody id="fastBoard"></tbody></table>

  <h3>🐢 Slow (≥90 days)</h3>
  <table><tbody id="slowBoard"></tbody></table>
</div>

<!-- PROFILE MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 id="pName"></h3>
    <div id="pHistory"></div>
    <button class="red" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const sb = window.supabase.createClient(
  "https://aeezsewfoozizduzuidv.supabase.co",
  "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz"
);

let data = [];
let statusChart, trendChart;

/* LOAD */
async function loadData() {
  const { data: rows } = await sb.from("Tracking").select("*").order("created_at", { ascending: false });
  data = rows || [];
  render();
  updateDashboard();
  updateCharts();
  updateLeaderboards();
}

/* ADD (AUTO CLEAR FIXED) */
async function addEntry() {
  const n = document.getElementById("name");
  const a = document.getElementById("address");
  const d = document.getElementById("dateSent");

  if (!n.value || !a.value) return alert("Required");

  const { error } = await sb.from("Tracking").insert([{
    name: n.value,
    address: a.value,
    date_sent: d.value || new Date().toISOString().split("T")[0],
    returned: false,
    signature_status: "pending"
  }]);

  if (error) return alert(error.message);

  n.value = "";
  a.value = "";
  d.value = "";

  loadData();
}

/* SEARCH FILTER */
function filtered() {
  const q = document.getElementById("search").value.toLowerCase();
  return data.filter(d =>
    (d.name || "").toLowerCase().includes(q) ||
    (d.address || "").toLowerCase().includes(q)
  );
}

/* DASHBOARD */
function updateDashboard() {
  document.getElementById("total").innerText = data.length;
  document.getElementById("pending").innerText = data.filter(d => !d.returned).length;
  document.getElementById("signed").innerText = data.filter(d => d.signature_status === "returned_signed").length;
  document.getElementById("unsigned").innerText = data.filter(d => d.signature_status === "returned_unsigned").length;
}

/* CHARTS */
function updateCharts() {
  const s = data.filter(d => d.signature_status === "returned_signed").length;
  const u = data.filter(d => d.signature_status === "returned_unsigned").length;
  const p = data.filter(d => !d.returned).length;

  if (statusChart) statusChart.destroy();
  statusChart = new Chart(document.getElementById("statusChart"), {
    type: "pie",
    data: {
      labels: ["Pending","Signed","Unsigned"],
      datasets: [{ data:[p,s,u], backgroundColor:["#ffc107","#28a745","#dc3545"] }]
    }
  });

  const m = {};
  data.forEach(d => {
    if (!d.date_sent) return;
    const k = d.date_sent.slice(0,7);
    m[k] = (m[k]||0)+1;
  });

  const labels = Object.keys(m).sort();
  const values = labels.map(x => m[x]);

  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById("trendChart"), {
    type: "line",
    data: {
      labels,
      datasets: [{ label:"Sent", data:values, borderColor:"#007bff", fill:false }]
    }
  });
}

/* LEADERBOARDS */
function updateLeaderboards() {
  const fast=[], slow=[];

  data.forEach(d=>{
    if(!d.date_sent||!d.date_received) return;
    const days = (new Date(d.date_received)-new Date(d.date_sent))/86400000;

    if(days<=30) fast.push({n:d.name,d:Math.floor(days)});
    if(days>=90) slow.push({n:d.name,d:Math.floor(days)});
  });

  document.getElementById("fastBoard").innerHTML =
    fast.map(x=>`<tr><td>${x.n}</td><td>${x.d}</td></tr>`).join("");

  document.getElementById("slowBoard").innerHTML =
    slow.map(x=>`<tr><td>${x.n}</td><td>${x.d}</td></tr>`).join("");
}

/* TABLE */
function render() {
  const t = document.getElementById("table");
  t.innerHTML = "";

  filtered().forEach(d=>{
    const st = d.signature_status||"pending";

    const tr=document.createElement("tr");
    tr.className =
      st==="returned_signed"?"signed":
      st==="returned_unsigned"?"unsigned":"pending";

    tr.innerHTML=`
      <td onclick="openProfile('${d.name}')">${d.name||""}</td>
      <td>${d.address||""}</td>
      <td>${d.date_sent||""}</td>
      <td>${st}</td>
      <td>
        <button class="green" onclick="setStatus('${d.id}','returned_signed')">Signed</button>
        <button class="orange" onclick="setStatus('${d.id}','returned_unsigned')">Not Signed</button>
        <button class="red" onclick="remove('${d.id}')">Del</button>
      </td>
    `;
    t.appendChild(tr);
  });
}

/* STATUS */
async function setStatus(id,s){
  await sb.from("Tracking").update({signature_status:s,returned:true}).eq("id",id);
  loadData();
}

/* DELETE */
async function remove(id){
  if(!confirm("Delete?"))return;
  await sb.from("Tracking").delete().eq("id",id);
  loadData();
}

/* PROFILE */
function openProfile(name){
  const p=data.filter(d=>d.name===name);
  document.getElementById("pName").innerText=name;
  document.getElementById("pHistory").innerHTML=
    p.map(x=>`<div>${x.date_sent} → ${x.signature_status}</div>`).join("");
  document.getElementById("modal").style.display="block";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

loadData();
setInterval(loadData,30000);
</script>

</body>
</html>
