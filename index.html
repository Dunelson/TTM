<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTM Tracker Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 15px; background: #f4f6f8; }
    input, select { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    
    .summary { width: 70%; margin: 10px auto; background: white; text-align: center; border-collapse: collapse; }
    .summary td { border: 1px solid #ddd; padding: 6px; font-size: 12px; }
    .chart-wrap { max-width: 200px; margin: 10px auto; }
    
    .bulk-area { background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #007bff; }
    
    /* Toggle Button Styling */
    #toggleFormBtn {
        background: #333; color: white; padding: 12px; width: 100%; border: none; 
        text-align: left; font-size: 14px; cursor: pointer; border-radius: 8px; 
        font-weight: bold; margin-bottom: 5px; display: block;
    }
    #toggleFormBtn:hover { background: #444; }

    /* Collapsible Form Styling */
    #formContent {
        padding: 15px; background-color: white; border: 1px solid #ddd; 
        border-radius: 8px; margin-bottom: 20px; display: block; 
    }

    /* Table Styles */
    table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
    th, td { border: 1px solid #ddd; padding: 8px; font-size: 13px; text-align: left; }
    .row-pending { background: #ffea7a; }
    .row-received { background: #c8f7d2; }
    .row-rts { background: #ffc7c7; }
    .row-unsigned { background: #cfe1ff; }
    
    .actor { color: blue; cursor: pointer; text-decoration: underline; font-weight: bold; }
    .known-input { width: 100%; font-size: 12px; padding: 4px; border: none; background: transparent; }
    .known-input:focus { background: #fff; border: 1px solid #ccc; }
    
    .deleteBtn { background: #b3261e; color: white; padding: 4px 8px; border: none; cursor: pointer; border-radius: 3px; }
    
    #actorModal {
        display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        background: white; padding: 20px; border: 1px solid #666; box-shadow: 0 4px 25px rgba(0,0,0,0.4);
        max-width: 90%; z-index: 1000; border-radius: 8px;
    }
</style>
</head>
<body>

<h2>TTM Tracker</h2>

<div class="bulk-area">
    <strong>Bulk Upload (.csv)</strong><br>
    <input type="file" id="csvFile" accept=".csv" style="width: auto; border: none;">
    <button onclick="uploadCSV()" style="background:#007bff; color:white; padding: 8px 15px; border:none; cursor:pointer; border-radius:4px;">Upload Entries</button>
</div>

<table class="summary">
    <tr>
        <td>Pending</td><td id="sumPending">0</td>
        <td>Received</td><td id="sumReceived">0</td>
        <td>RTS</td><td id="sumRTS">0</td>
        <td>Unsigned</td><td id="sumUnsigned">0</td>
    </tr>
</table>
<div class="chart-wrap"><canvas id="pieChart"></canvas></div>

<button type="button" id="toggleFormBtn" onclick="toggleForm()">▼ Add New Entry</button>

<div id="formContent">
    <input id="f_name" placeholder="Name">
    <select id="f_role">
        <option value="">Role Type</option>
        <option value="Actor">Actor</option>
        <option value="Director">Director</option>
        <option value="Musician">Musician</option>
        <option value="Comedian">Comedian</option>
        <option value="Producer">Producer</option>
        <option value="Coach">Coach</option>
    </select>
    <input id="f_known" placeholder="Known For">
    <input id="f_address" placeholder="Address">
    <div style="margin-top:10px;">
        <label style="font-size:11px; font-weight: bold;">Date Sent</label>
        <input id="f_datesent" type="date">
    </div>
    <button type="button" onclick="addEntry()" style="background:#28a745;color:white;width:100%;padding:12px;margin-top:10px;border:none;cursor:pointer;border-radius:4px;font-weight:bold;">Save Entry</button>
</div>

<div style="margin: 20px 0 8px 0;">
    <input id="search" placeholder="Search name or movie..." oninput="sortAndRender()" style="width: 250px;">
</div>

<table>
<thead>
    <tr>
        <th>Added</th>
        <th>Name</th>
        <th>Role</th>
        <th>Known For</th>
        <th>Address</th>
        <th>Sent</th>
        <th>Received</th>
        <th>Status</th>
        <th></th>
    </tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div id="actorModal">
    <h3 id="modalName"></h3>
    <div id="modalContent"></div>
    <button onclick="closeModal()" style="margin-top:10px;">Close</button>
</div>

<script>
const sb = window.supabase.createClient(
    "https://aeezsewfoozizduzuidv.supabase.co",
    "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz"
);

const TMDB_API_KEY = "d4656a893658ed711bcadef18dc23300";
let data = [];
let chart;

// Toggle Form Visibility
function toggleForm() {
    const content = document.getElementById("formContent");
    const btn = document.getElementById("toggleFormBtn");
    if (content.style.display === "none") {
        content.style.display = "block";
        btn.innerText = "▼ Add New Entry";
    } else {
        content.style.display = "none";
        btn.innerText = "▶ Add New Entry (Expand)";
    }
}

async function loadData() {
    const { data: rows, error } = await sb.from("Tracking").select("*").order("created_at", { ascending: false });
    data = rows || [];
    sortAndRender();
    updateStats();
}
loadData();

// Add Manual Entry
async function addEntry() {
    const name = document.getElementById("f_name").value.trim();
    const address = document.getElementById("f_address").value.trim();
    const dateSent = document.getElementById("f_datesent").value;

    if (!name || !address) return alert("Name and Address are required!");

    const { error } = await sb.from("Tracking").insert([{
        name,
        role_type: document.getElementById("f_role").value,
        known_for: document.getElementById("f_known").value.trim(),
        address,
        date_sent: dateSent || null,
        status: "pending"
    }]);

    if (!error) {
        document.querySelectorAll("#formContent input").forEach(i => i.value = "");
        loadData();
    } else {
        alert("Error saving: " + error.message);
    }
}

// Bulk Upload with Ghost-Row Filter
async function uploadCSV() {
    const file = document.getElementById('csvFile').files[0];
    if (!file) return alert("Please select a file first");
    
    Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: async (res) => {
            const clean = res.data
                .filter(row => row.name && row.name.trim() !== "") 
                .map(r => ({
                    name: r.name, 
                    address: r.address || "", 
                    role_type: r.role_type || "", 
                    known_for: r.known_for || "", 
                    date_sent: r.date_sent || null, 
                    status: 'pending'
                }));

            if (clean.length > 0) {
                const { error } = await sb.from("Tracking").insert(clean);
                if (error) alert("Error: " + error.message);
                else { alert("Uploaded " + clean.length + " entries!"); loadData(); }
            } else {
                alert("No valid names found in CSV.");
            }
        }
    });
}

function sortAndRender() {
    const search = document.getElementById("search").value.toLowerCase();
    const filtered = data.filter(d => (d.name||"").toLowerCase().includes(search) || (d.known_for||"").toLowerCase().includes(search));
    
    document.getElementById("tableBody").innerHTML = filtered.map(d => `
        <tr class="row-${d.status || 'pending'}">
            <td style="font-size:10px;">${d.created_at ? new Date(d.created_at).toLocaleDateString() : '-'}</td>
            <td class="actor" data-name="${d.name}">${d.name || ''}</td>
            <td>${d.role_type || ''}</td>
            <td><input class="known-input" value="${d.known_for || ''}" onchange="updateKnown('${d.id}', this.value)"></td>
            <td style="font-size:11px;">${d.address || ''}</td>
            <td>${d.date_sent || ''}</td>
            <td>${d.date_received || ''}</td>
            <td>
                <select onchange="updateStatus('${d.id}', this.value)" style="font-size:11px;">
                    <option value="pending" ${d.status==='pending'?'selected':''}>Pending</option>
                    <option value="received" ${d.status==='received'?'selected':''}>Received</option>
                    <option value="rts" ${d.status==='rts'?'selected':''}>RTS</option>
                    <option value="unsigned" ${d.status==='unsigned'?'selected':''}>Unsigned</option>
                </select>
            </td>
            <td><button class="deleteBtn" onclick="deleteEntry('${d.id}')">✕</button></td>
        </tr>`).join("");
}

async function updateStatus(id, status) {
    const update = { status };
    if (status === "received") update.date_received = new Date().toISOString().split("T")[0];
    await sb.from("Tracking").update(update).eq("id", id);
    loadData();
}

async function updateKnown(id, val) {
    await sb.from("Tracking").update({ known_for: val }).eq("id", id);
}

async function deleteEntry(id) {
    if(confirm("Are you sure you want to delete this?")) {
        await sb.from("Tracking").delete().eq("id", id);
        loadData();
    }
}

function updateStats() {
    const stats = { pending: 0, received: 0, rts: 0, unsigned: 0 };
    data.forEach(d => stats[d.status || "pending"]++);
    document.getElementById("sumPending").innerText = stats.pending;
    document.getElementById("sumReceived").innerText = stats.received;
    document.getElementById("sumRTS").innerText = stats.rts;
    document.getElementById("sumUnsigned").innerText = stats.unsigned;
    
    if (chart) chart.destroy();
    chart = new Chart(document.getElementById("pieChart"), {
        type: "pie",
        data: {
            labels: ["Received", "Pending", "RTS", "Unsigned"],
            datasets: [{ 
                data: [stats.received, stats.pending, stats.rts, stats.unsigned], 
                backgroundColor: ["#1f8f3a","#ffea7a","#b3261e","#1e5bb3"] 
            }]
        },
        options: { plugins: { legend: { display: false } } }
    });
}

// TMDB Modal
document.addEventListener("click", async e => {
    if (e.target.classList.contains("actor")) {
        const name = e.target.dataset.name;
        const modal = document.getElementById("actorModal");
        document.getElementById("modalName").textContent = name;
        document.getElementById("modalContent").innerHTML = "Searching TMDB...";
        modal.style.display = "block";
        
        try {
            const res = await fetch(`https://api.themoviedb.org/3/search/person?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(name)}`);
            const json = await res.json();
            if (json.results && json.results.length > 0) {
                const p = json.results[0];
                const dRes = await fetch(`https://api.themoviedb.org/3/person/${p.id}?api_key=${TMDB_API_KEY}`);
                const details = await dRes.json();
                document.getElementById("modalContent").innerHTML = `<p>${details.biography.substring(0, 400)}...</p>`;
            } else {
                document.getElementById("modalContent").innerHTML = "No bio found.";
            }
        } catch (err) {
            document.getElementById("modalContent").innerHTML = "Error fetching TMDB.";
        }
    }
});

function closeModal() { document.getElementById("actorModal").style.display = "none"; }
</script>
</body>
</html>
