<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTM Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; padding:15px; background:#f4f6f8; margin:0; }

input, button {
  width:100%;
  padding:12px;
  margin-top:8px;
  box-sizing:border-box;
}

button {
  cursor:pointer;
  border:none;
  border-radius:4px;
}

.green { background:#28a745; color:white; }
.red { background:#dc3545; color:white; }

.pending { background:#f8d7da; }
.returned { background:#d4edda; }

table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th, td {
  padding:10px;
  border:1px solid #ccc;
  font-size:14px;
}

th {
  background:#333;
  color:white;
}

.actions button {
  width:auto;
  padding:6px 10px;
  margin-right:5px;
}
</style>
</head>

<body>

<h2>TTM Tracker</h2>

<input id="name" placeholder="Name *">
<input id="address" placeholder="Address *">
<input id="dateSent" type="date">

<button class="green" onclick="addEntry()">Save Entry</button>

<hr>

<table>
<thead>
<tr>
  <th>Name</th>
  <th>Address</th>
  <th>Sent</th>
  <th>Received</th>
  <th>Status</th>
  <th>Actions</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script>
const sb = window.supabase.createClient(
  "https://aeezsewfoozizduzuidv.supabase.co",
  "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz"
);

let data = [];

/* =========================
   LOAD DATA
========================= */
async function loadData() {
  const { data: rows, error } = await sb
    .from("Tracking")
    .select("*")
    .order("created_at", { ascending: false });

  if (!error) {
    data = rows || [];
    render();
  } else {
    console.error(error);
  }
}

/* =========================
   ADD ENTRY
========================= */
async function addEntry() {
  const name = document.getElementById("name").value.trim();
  const address = document.getElementById("address").value.trim();
  const date_sent =
    document.getElementById("dateSent").value ||
    new Date().toISOString().split("T")[0];

  if (!name || !address) {
    alert("Name and Address required");
    return;
  }

  const { error } = await sb.from("Tracking").insert([{
    name,
    address,
    date_sent,
    date_received: null,
    returned: false,
    rts: null,
    received_auto: null
  }]);

  if (error) {
    console.error(error);
    alert(error.message);
    return;
  }

  document.getElementById("name").value = "";
  document.getElementById("address").value = "";
  document.getElementById("dateSent").value = "";

  loadData();
}

/* =========================
   TOGGLE RETURNED
========================= */
async function toggle(item) {
  await sb
    .from("Tracking")
    .update({ returned: !item.returned })
    .eq("id", item.id);

  loadData();
}

/* =========================
   DELETE
========================= */
async function remove(id) {
  await sb
    .from("Tracking")
    .delete()
    .eq("id", id);

  loadData();
}

/* =========================
   RENDER
========================= */
function render() {
  const tbody = document.getElementById("table");
  tbody.innerHTML = "";

  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">No entries</td></tr>`;
    return;
  }

  data.forEach(item => {
    const tr = document.createElement("tr");
    tr.className = item.returned ? "returned" : "pending";

    tr.innerHTML = `
      <td>${item.name || ""}</td>
      <td>${item.address || ""}</td>
      <td>${item.date_sent || ""}</td>
      <td>${item.date_received || "-"}</td>
      <td>${item.returned ? "Returned" : "Pending"}</td>
      <td class="actions">
        <button class="green" onclick='toggle(${JSON.stringify(item)})'>
          Toggle
        </button>
        <button class="red" onclick="remove('${item.id}')">
          Delete
        </button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

loadData();
</script>

</body>
</html>
