<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTM Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 15px;
  background: #f4f6f8;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: white;
}

th, td {
  border: 1px solid #ddd;
  padding: 6px;
  font-size: 13px;
}

/* ROW COLORS */
.row-pending { background: #ffea7a; }
.row-received { background: #c8f7d2; }
.row-rts { background: #ffc7c7; }
.row-unsigned { background: #cfe1ff; }

/* compact inputs */
.dateInput {
  width: 120px;
  font-size: 12px;
  padding: 4px;
}

/* clickable actor */
.actor {
  color: blue;
  cursor: pointer;
}

/* delete button */
.deleteBtn {
  background: #b3261e;
  color: white;
  padding: 4px;
  font-size: 12px;
}
</style>
</head>

<body>

<h2>TTM Tracker</h2>

<input id="search" placeholder="Search..." oninput="render()">

<input id="name" placeholder="Name">
<input id="address" placeholder="Address">
<input id="dateSent" type="date">

<button onclick="addEntry()" style="background:#28a745;color:white;width:100%;padding:10px;margin-top:6px;">
Save Entry
</button>

<hr>

<table>
<thead>
<tr>
  <th>Name</th>
  <th>Address</th>
  <th>Sent</th>
  <th>Received</th>
  <th>Status</th>
  <th>Actions</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script>

const sb = window.supabase.createClient(
  "https://aeezsewfoozizduzuidv.supabase.co",
  "sb_publishable_l4QEnXwOlTZJnsN6VE6jrA_tBa_2aoz"
);

let data = [];
let chart;

/* =========================
   LOAD
========================= */
async function loadData() {
  const { data: rows } = await sb.from("Tracking")
    .select("*")
    .order("created_at", { ascending: false });

  data = rows || [];
  render();
}

loadData();

/* =========================
   ADD
========================= */
async function addEntry() {

  const name = document.getElementById("name").value.trim();
  const address = document.getElementById("address").value.trim();
  const date_sent = document.getElementById("dateSent").value;

  if (!name || !address) return alert("Missing fields");

  await sb.from("Tracking").insert([{
    name,
    address,
    date_sent,
    status: "pending",
    date_received: null
  }]);

  document.getElementById("name").value = "";
  document.getElementById("address").value = "";
  document.getElementById("dateSent").value = "";

  loadData();
}

/* =========================
   UPDATE STATUS
========================= */
async function updateStatus(id, status) {

  const update = { status };

  if (status === "received") {
    update.date_received = new Date().toISOString().split("T")[0];
  }

  await sb.from("Tracking")
    .update(update)
    .eq("id", id);

  loadData();
}

/* =========================
   UPDATE DATE (FIXED CLEAR SUPPORT)
========================= */
async function updateDate(id, value) {

  await sb.from("Tracking")
    .update({
      date_received: value === "" ? null : value
    })
    .eq("id", id);

  loadData();
}

/* =========================
   DELETE (RESTORED)
========================= */
async function deleteEntry(id) {

  if (!confirm("Delete entry?")) return;

  await sb.from("Tracking")
    .delete()
    .eq("id", id);

  loadData();
}

/* =========================
   RENDER (SAFE EVENT MODEL)
========================= */
function render() {

  const search = (document.getElementById("search").value || "").toLowerCase();

  const filtered = data.filter(d =>
    (d.name || "").toLowerCase().includes(search) ||
    (d.address || "").toLowerCase().includes(search)
  );

  const t = document.getElementById("table");
  t.innerHTML = "";

  filtered.forEach(d => {

    const status = d.status || "pending";

    t.innerHTML += `
      <tr class="row-${status}">

        <td class="actor" data-name="${d.name}">
          ${d.name || ""}
        </td>

        <td>${d.address || ""}</td>
        <td>${d.date_sent || ""}</td>

        <td>
          <input class="dateInput"
            type="date"
            value="${d.date_received || ""}"
            data-id="${d.id}"
            data-action="date">
          <button data-id="${d.id}" data-action="clearDate">Clear</button>
        </td>

        <td>
          <select data-id="${d.id}" data-action="status">
            <option value="pending" ${status==="pending"?"selected":""}>Pending</option>
            <option value="received" ${status==="received"?"selected":""}>Received</option>
            <option value="rts" ${status==="rts"?"selected":""}>RTS</option>
            <option value="unsigned" ${status==="unsigned"?"selected":""}>Unsigned</option>
          </select>
        </td>

        <td>
          <button class="deleteBtn"
            data-id="${d.id}"
            data-action="delete">
            Delete
          </button>
        </td>

      </tr>
    `;
  });
}

/* =========================
   EVENT DELEGATION (FIXES ALL CLICK BUGS)
========================= */
document.addEventListener("click", (e) => {

  const id = e.target.dataset.id;
  const action = e.target.dataset.action;

  if (!action) return;

  if (action === "delete") {
    deleteEntry(id);
  }

  if (action === "clearDate") {
    updateDate(id, null);
  }

  if (e.target.classList.contains("actor")) {
    alert("Actor: " + e.target.dataset.name);
  }
});

/* status change */
document.addEventListener("change", (e) => {

  const id = e.target.dataset.id;
  const action = e.target.dataset.action;

  if (action === "status") {
    updateStatus(id, e.target.value);
  }

  if (action === "date") {
    updateDate(id, e.target.value);
  }
});

</script>

</body>
</html>
